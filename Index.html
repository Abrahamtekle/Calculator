<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator - Glassmorphism</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh;
  font-family: 'Segoe UI', system-ui, sans-serif;
}
.calc-window {
  width: 320px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 24px;
  overflow: hidden;
  backdrop-filter: blur(20px);
  box-shadow: 0 20px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.2);
}
.title-bar {
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 18px 8px;
}
.menu-btn, .history-btn {
  background: rgba(255,255,255,0.1); border: none; color: #fff;
  font-size: 14px; cursor: pointer; padding: 6px 8px; border-radius: 8px;
  transition: background 0.2s;
}
.menu-btn:hover, .history-btn:hover { background: rgba(255,255,255,0.2); }
.title-text { font-size: 15px; font-weight: 300; color: rgba(255,255,255,0.9); letter-spacing: 2px; text-transform: uppercase; }
.title-left { display: flex; align-items: center; gap: 10px; }
.display-area {
  padding: 10px 20px 14px;
  min-height: 85px;
  display: flex; flex-direction: column;
  align-items: flex-end; justify-content: flex-end;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
.expression { font-size: 13px; color: rgba(255,255,255,0.4); min-height: 18px; text-align: right; }
.result { font-size: 46px; font-weight: 200; color: #fff; text-align: right; line-height: 1.1; word-break: break-all; }
.mode-row { display: flex; gap: 4px; padding: 8px 14px 4px; }
.mode-btn { background: none; border: none; color: rgba(255,255,255,0.4); font-size: 11px; cursor: pointer; padding: 3px 8px; border-radius: 12px; transition: all 0.2s; }
.mode-btn.active { color: #fff; background: rgba(255,255,255,0.15); }
.mode-btn:hover { color: #fff; background: rgba(255,255,255,0.1); }
.shift-btn { margin-left: auto; }
.mem-row { display: flex; padding: 0 10px 6px; gap: 2px; }
.mem-btn { flex: 1; background: none; border: none; color: rgba(255,255,255,0.4); font-size: 11px; padding: 5px 2px; cursor: pointer; border-radius: 6px; transition: all 0.2s; }
.mem-btn:hover { color: #fff; background: rgba(255,255,255,0.08); }
.tab-row { display: flex; padding: 0 10px 6px; border-bottom: 1px solid rgba(255,255,255,0.08); }
.tab-btn { flex: 1; background: none; border: none; color: rgba(255,255,255,0.4); font-size: 11px; padding: 6px 4px; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; }
.tab-btn.active { color: #a78bfa; border-bottom: 2px solid #a78bfa; }
.tab-btn:hover { color: #fff; }
.func-panel { display: grid; grid-template-columns: repeat(3,1fr); gap: 1px; padding: 6px 10px; }
.func-btn { background: none; border: none; color: rgba(255,255,255,0.6); font-size: 12px; padding: 8px 4px; cursor: pointer; border-radius: 8px; transition: all 0.2s; }
.func-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
.btn-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 6px; padding: 6px 12px 16px; }
.btn {
  border: none; font-size: 16px; height: 56px; cursor: pointer;
  border-radius: 14px; display: flex; align-items: center; justify-content: center;
  font-family: 'Segoe UI', sans-serif; transition: all 0.15s; font-weight: 300;
}
.btn-num { background: rgba(255,255,255,0.12); color: #fff; font-size: 18px; border: 1px solid rgba(255,255,255,0.08); }
.btn-num:hover { background: rgba(255,255,255,0.2); transform: scale(1.05); }
.btn-num:active { transform: scale(0.97); }
.btn-fn { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.8); font-size: 13px; border: 1px solid rgba(255,255,255,0.06); }
.btn-fn:hover { background: rgba(255,255,255,0.12); color: #fff; }
.btn-op { background: rgba(167,139,250,0.2); color: #c4b5fd; font-size: 20px; border: 1px solid rgba(167,139,250,0.2); }
.btn-op:hover { background: rgba(167,139,250,0.35); color: #fff; }
.btn-op.selected { background: rgba(167,139,250,0.5); color: #fff; }
.btn-eq { background: linear-gradient(135deg, #a78bfa, #7c3aed); color: #fff; font-size: 22px; box-shadow: 0 4px 15px rgba(124,58,237,0.4); border: none; }
.btn-eq:hover { background: linear-gradient(135deg, #c4b5fd, #a78bfa); transform: scale(1.02); box-shadow: 0 6px 20px rgba(124,58,237,0.5); }
.btn-eq:active { transform: scale(0.98); }
.btn-span4 { grid-column: span 4; height: 52px; }
</style>
</head>
<body>
<div class="calc-window">
  <div class="title-bar">
    <div class="title-left">
      <button class="menu-btn">&#9776;</button>
      <span class="title-text">Scientific</span>
    </div>
    <button class="history-btn">&#10227;</button>
  </div>
  <div class="display-area">
    <div class="expression" id="expr2"></div>
    <div class="result" id="res2">0</div>
  </div>
  <div class="mode-row">
    <button class="mode-btn active" id="d2-deg" onclick="d2_setMode('DEG')">DEG</button>
    <button class="mode-btn" id="d2-rad" onclick="d2_setMode('RAD')">RAD</button>
    <button class="mode-btn shift-btn" onclick="d2_toggleFE()">F-E</button>
  </div>
  <div class="mem-row">
    <button class="mem-btn" onclick="d2_mc()">MC</button>
    <button class="mem-btn" onclick="d2_mr()">MR</button>
    <button class="mem-btn" onclick="d2_madd()">M+</button>
    <button class="mem-btn" onclick="d2_msub()">M-</button>
    <button class="mem-btn" onclick="d2_ms()">MS</button>
    <button class="mem-btn">&#8250;</button>
  </div>
  <div class="tab-row">
    <button class="tab-btn active" id="d2-ttrig" onclick="d2_tab('trig')">&#8743; Trigonometry</button>
    <button class="tab-btn" id="d2-tfunc" onclick="d2_tab('func')">&#8744; Function</button>
  </div>
  <div class="func-panel" id="d2-ptrig">
    <button class="func-btn" onclick="d2_trig('sin')">sin</button>
    <button class="func-btn" onclick="d2_trig('cos')">cos</button>
    <button class="func-btn" onclick="d2_trig('tan')">tan</button>
    <button class="func-btn" onclick="d2_trig('asin')">sin⁻¹</button>
    <button class="func-btn" onclick="d2_trig('acos')">cos⁻¹</button>
    <button class="func-btn" onclick="d2_trig('atan')">tan⁻¹</button>
    <button class="func-btn" onclick="d2_trig('sinh')">sinh</button>
    <button class="func-btn" onclick="d2_trig('cosh')">cosh</button>
    <button class="func-btn" onclick="d2_trig('tanh')">tanh</button>
  </div>
  <div class="func-panel" id="d2-pfunc" style="display:none;">
    <button class="func-btn" onclick="d2_fn('floor')">floor</button>
    <button class="func-btn" onclick="d2_fn('ceil')">ceil</button>
    <button class="func-btn" onclick="d2_fn('abs')">|x|</button>
    <button class="func-btn" onclick="d2_fn('exp')">exp</button>
    <button class="func-btn" onclick="d2_fn('log')">log</button>
    <button class="func-btn" onclick="d2_fn('ln')">ln</button>
    <button class="func-btn" onclick="d2_fn('rand')">rand</button>
    <button class="func-btn" onclick="d2_fn('round')">round</button>
    <button class="func-btn" onclick="d2_fn('mod')">mod</button>
  </div>
  <div class="btn-grid">
    <button class="btn btn-fn" onclick="d2_fn('percent')">%</button>
    <button class="btn btn-fn" onclick="d2_fn('ce')">CE</button>
    <button class="btn btn-fn" onclick="d2_fn('c')">C</button>
    <button class="btn btn-fn" onclick="d2_fn('bs')">&#9003;</button>
    <button class="btn btn-fn" onclick="d2_fn('inv')">&#185;/x</button>
    <button class="btn btn-fn" onclick="d2_fn('sq')">x²</button>
    <button class="btn btn-fn" onclick="d2_fn('sqrt')">&#8730;x</button>
    <button class="btn btn-op" onclick="d2_op('/')">÷</button>
    <button class="btn btn-fn" onclick="d2_fn('pow')">xʸ</button>
    <button class="btn btn-num" onclick="d2_num('7')">7</button>
    <button class="btn btn-num" onclick="d2_num('8')">8</button>
    <button class="btn btn-num" onclick="d2_num('9')">9</button>
    <button class="btn btn-op" onclick="d2_op('*')">×</button>
    <button class="btn btn-num" onclick="d2_num('4')">4</button>
    <button class="btn btn-num" onclick="d2_num('5')">5</button>
    <button class="btn btn-num" onclick="d2_num('6')">6</button>
    <button class="btn btn-op" onclick="d2_op('-')">−</button>
    <button class="btn btn-num" onclick="d2_num('1')">1</button>
    <button class="btn btn-num" onclick="d2_num('2')">2</button>
    <button class="btn btn-num" onclick="d2_num('3')">3</button>
    <button class="btn btn-op" onclick="d2_op('+')">+</button>
    <button class="btn btn-fn" onclick="d2_fn('pm')">⁺∕₋</button>
    <button class="btn btn-num" onclick="d2_num('0')">0</button>
    <button class="btn btn-fn" onclick="d2_fn('dot')">.</button>
    <button class="btn btn-eq btn-span4" onclick="d2_fn('eq')">=</button>
  </div>
</div>
<script>
var d2={disp:'',op:'',first:null,wait:false,mem:0,mode:'DEG',fe:false,justCalc:false};
function d2_upd(v){var s=String(v),el=document.getElementById('res2');if(s.length>12)el.style.fontSize='26px';else if(s.length>9)el.style.fontSize='36px';else el.style.fontSize='46px';el.textContent=s;}
function d2_num(n){if(d2.justCalc){d2.disp='';d2.justCalc=false;}if(d2.wait){d2.disp=n;d2.wait=false;}else{d2.disp=d2.disp==='0'&&n!=='.'?n:d2.disp+n;}d2_upd(d2.disp);}
function d2_calc(a,b,o){var r;switch(o){case'+':r=a+b;break;case'-':r=a-b;break;case'*':r=a*b;break;case'/':r=b===0?'Error':a/b;break;case'pow':r=Math.pow(a,b);break;case'mod':r=a%b;break;default:r=b;}return typeof r==='number'?Math.round(r*1e10)/1e10:r;}
function d2_op(o){var cur=parseFloat(d2.disp||0);if(d2.first!==null&&!d2.wait){var r=d2_calc(d2.first,cur,d2.op);d2.first=r;d2_upd(r);d2.disp=String(r);}else{d2.first=cur;}d2.op=o;d2.wait=true;d2.justCalc=false;var map={'+':'+','-':'−','*':'×','/':'÷'};document.getElementById('expr2').textContent=d2.first+' '+map[o];document.querySelectorAll('.calc-window .btn-op').forEach(function(b){b.classList.remove('selected');if(b.textContent.trim()===map[o])b.classList.add('selected');});}
function d2_fn(k){var c=parseFloat(d2.disp||document.getElementById('res2').textContent||0);switch(k){case'eq':if(d2.first!==null&&d2.op){var r=d2_calc(d2.first,c,d2.op);document.getElementById('expr2').textContent=d2.first+' '+d2.op+' '+c+' =';d2_upd(r);d2.disp=String(r);d2.first=null;d2.op='';d2.justCalc=true;document.querySelectorAll('.calc-window .btn-op').forEach(function(b){b.classList.remove('selected');});}break;case'c':d2.disp='';d2.first=null;d2.op='';d2.wait=false;document.getElementById('expr2').textContent='';d2_upd('0');break;case'ce':d2.disp='';d2_upd('0');break;case'bs':d2.disp=d2.disp.slice(0,-1);d2_upd(d2.disp||'0');break;case'dot':if(!d2.disp.includes('.')){d2.disp+=d2.disp===''?'0.':'.';d2_upd(d2.disp);}break;case'pm':d2.disp=d2.disp.startsWith('-')?d2.disp.slice(1):'-'+d2.disp;d2_upd(d2.disp);break;case'percent':var p=d2.first!==null?Math.round(d2.first*c/100*1e10)/1e10:Math.round(c/100*1e10)/1e10;d2.disp=String(p);d2_upd(p);break;case'inv':d2_upd(Math.round(1/c*1e10)/1e10);break;case'sq':d2_upd(Math.round(c*c*1e10)/1e10);break;case'sqrt':d2_upd(Math.round(Math.sqrt(c)*1e10)/1e10);break;case'pow':d2.first=c;d2.op='pow';d2.wait=true;document.getElementById('expr2').textContent=c+' ^';break;case'mod':d2.first=c;d2.op='mod';d2.wait=true;break;case'exp':d2_upd(Math.round(Math.exp(c)*1e10)/1e10);break;case'log':d2_upd(Math.round(Math.log10(c)*1e10)/1e10);break;case'ln':d2_upd(Math.round(Math.log(c)*1e10)/1e10);break;case'floor':d2_upd(Math.floor(c));break;case'ceil':d2_upd(Math.ceil(c));break;case'abs':d2_upd(Math.abs(c));break;case'round':d2_upd(Math.round(c));break;case'rand':d2_upd(Math.round(Math.random()*1e10)/1e10);break;}}
function d2_trig(f){var c=parseFloat(d2.disp||0),v=d2.mode==='DEG'?c*Math.PI/180:c,r;switch(f){case'sin':r=Math.sin(v);break;case'cos':r=Math.cos(v);break;case'tan':r=Math.tan(v);break;case'sinh':r=Math.sinh(v);break;case'cosh':r=Math.cosh(v);break;case'tanh':r=Math.tanh(v);break;case'asin':r=Math.asin(c);if(d2.mode==='DEG')r=r*180/Math.PI;break;case'acos':r=Math.acos(c);if(d2.mode==='DEG')r=r*180/Math.PI;break;case'atan':r=Math.atan(c);if(d2.mode==='DEG')r=r*180/Math.PI;break;}r=Math.round(r*1e10)/1e10;d2.disp=String(r);d2_upd(r);}
function d2_setMode(m){d2.mode=m;document.getElementById('d2-deg').classList.toggle('active',m==='DEG');document.getElementById('d2-rad').classList.toggle('active',m==='RAD');}
function d2_toggleFE(){d2.fe=!d2.fe;var c=parseFloat(document.getElementById('res2').textContent||0);d2_upd(d2.fe?c.toExponential(4):c);}
function d2_tab(t){document.getElementById('d2-ttrig').classList.toggle('active',t==='trig');document.getElementById('d2-tfunc').classList.toggle('active',t==='func');document.getElementById('d2-ptrig').style.display=t==='trig'?'grid':'none';document.getElementById('d2-pfunc').style.display=t==='func'?'grid':'none';}
function d2_mc(){d2.mem=0;}function d2_mr(){d2.disp=String(d2.mem);d2_upd(d2.mem);}function d2_madd(){d2.mem+=parseFloat(d2.disp)||0;}function d2_msub(){d2.mem-=parseFloat(d2.disp)||0;}function d2_ms(){d2.mem=parseFloat(d2.disp)||0;}
</script>
</body>
</html>
